<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="680" cy="-40" r="200" fill="#a855f7" fill-opacity="0.06" />
  <circle cx="720" cy="440" r="160" fill="#6366f1" fill-opacity="0.06" />
  <circle cx="-30" cy="200" r="140" fill="#a855f7" fill-opacity="0.04" />

  <!-- Neural network nodes (decorative) -->
  <!-- Layer 1 -->
  <circle cx="590" cy="100" r="6" fill="#a855f7" fill-opacity="0.3" />
  <circle cx="590" cy="160" r="6" fill="#a855f7" fill-opacity="0.3" />
  <circle cx="590" cy="220" r="6" fill="#a855f7" fill-opacity="0.3" />
  <circle cx="590" cy="280" r="6" fill="#a855f7" fill-opacity="0.3" />
  <!-- Layer 2 -->
  <circle cx="660" cy="130" r="6" fill="#6366f1" fill-opacity="0.3" />
  <circle cx="660" cy="200" r="6" fill="#6366f1" fill-opacity="0.3" />
  <circle cx="660" cy="270" r="6" fill="#6366f1" fill-opacity="0.3" />
  <!-- Layer 3 -->
  <circle cx="730" cy="160" r="6" fill="#a855f7" fill-opacity="0.3" />
  <circle cx="730" cy="240" r="6" fill="#a855f7" fill-opacity="0.3" />
  <!-- Connections layer 1->2 -->
  <line x1="590" y1="100" x2="660" y2="130" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="100" x2="660" y2="200" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="160" x2="660" y2="130" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="160" x2="660" y2="200" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="160" x2="660" y2="270" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="220" x2="660" y2="200" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="220" x2="660" y2="270" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="280" x2="660" y2="200" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <line x1="590" y1="280" x2="660" y2="270" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" />
  <!-- Connections layer 2->3 -->
  <line x1="660" y1="130" x2="730" y2="160" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" />
  <line x1="660" y1="130" x2="730" y2="240" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" />
  <line x1="660" y1="200" x2="730" y2="160" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" />
  <line x1="660" y1="200" x2="730" y2="240" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" />
  <line x1="660" y1="270" x2="730" y2="160" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" />
  <line x1="660" y1="270" x2="730" y2="240" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" />

  <!-- Code decorations -->
  <text x="60" y="345" font-family="monospace" font-size="36" fill="#a855f7" fill-opacity="0.1" font-weight="bold">streamText({ model })</text>
  <text x="540" y="375" font-family="monospace" font-size="32" fill="#6366f1" fill-opacity="0.1" font-weight="bold">tool_call</text>

  <!-- Track badge -->
  <rect x="60" y="52" width="148" height="32" rx="16" fill="url(#glow)" fill-opacity="0.25" />
  <text x="134" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.95" text-anchor="middle" font-weight="600" letter-spacing="1">FRONTEND AI</text>

  <!-- Course number -->
  <text x="60" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.5" font-weight="500" letter-spacing="2">COURSE 06</text>

  <!-- Course title (two lines) -->
  <text x="60" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="52" fill="#ffffff" font-weight="800" letter-spacing="-0.5">Frontend AI</text>
  <text x="60" y="267" font-family="'Segoe UI', Arial, sans-serif" font-size="52" fill="url(#glow)" font-weight="800" letter-spacing="-0.5">Development</text>

  <!-- Divider -->
  <line x1="60" y1="295" x2="380" y2="295" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1" />

  <!-- Stats -->
  <text x="60" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.6">4 Modules  ·  14 Lessons  ·  Requires React</text>
</svg>

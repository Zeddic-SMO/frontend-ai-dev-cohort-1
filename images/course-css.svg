<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#264DE4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2965F1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="680" cy="-40" r="200" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="720" cy="440" r="160" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="-30" cy="200" r="140" fill="#ffffff" fill-opacity="0.04" />

  <!-- Code decorations -->
  <text x="540" y="130" font-family="monospace" font-size="90" fill="#ffffff" fill-opacity="0.07" font-weight="bold">{ }</text>
  <text x="60" y="345" font-family="monospace" font-size="44" fill="#ffffff" fill-opacity="0.07" font-weight="bold">.class {}</text>
  <text x="510" y="375" font-family="monospace" font-size="36" fill="#ffffff" fill-opacity="0.07" font-weight="bold">@media</text>

  <!-- Track badge -->
  <rect x="60" y="52" width="180" height="32" rx="16" fill="#ffffff" fill-opacity="0.15" />
  <text x="150" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.9" text-anchor="middle" font-weight="600" letter-spacing="1">WEB FUNDAMENTALS</text>

  <!-- Course number -->
  <text x="60" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.6" font-weight="500" letter-spacing="2">COURSE 02</text>

  <!-- Course title -->
  <text x="60" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#ffffff" font-weight="800" letter-spacing="-1">CSS</text>

  <!-- Subtitle -->
  <text x="60" y="262" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.75" font-weight="400">Styling &amp; Layout</text>

  <!-- Divider -->
  <line x1="60" y1="295" x2="300" y2="295" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />

  <!-- Stats -->
  <text x="60" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.7">4 Modules  ·  14 Lessons  ·  Requires HTML</text>

  <!-- CSS3 shield icon (simplified) -->
  <g transform="translate(648, 160)">
    <polygon points="46,0 92,10 80,90 46,110 12,90 0,10" fill="#ffffff" fill-opacity="0.12" />
    <polygon points="46,14 78,22 68,82 46,96 24,82 14,22" fill="#ffffff" fill-opacity="0.08" />
    <text x="46" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#ffffff" fill-opacity="0.5" font-weight="900" text-anchor="middle">3</text>
  </g>
</svg>

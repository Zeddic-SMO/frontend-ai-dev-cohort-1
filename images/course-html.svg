<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E44D26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F16529;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="680" cy="-40" r="200" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="720" cy="440" r="160" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="-30" cy="200" r="140" fill="#ffffff" fill-opacity="0.04" />

  <!-- Code tag decorations -->
  <text x="560" y="120" font-family="monospace" font-size="96" fill="#ffffff" fill-opacity="0.07" font-weight="bold">&lt;/&gt;</text>
  <text x="60" y="340" font-family="monospace" font-size="52" fill="#ffffff" fill-opacity="0.07" font-weight="bold">&lt;html&gt;</text>
  <text x="500" y="370" font-family="monospace" font-size="40" fill="#ffffff" fill-opacity="0.07" font-weight="bold">&lt;/body&gt;</text>

  <!-- Track badge -->
  <rect x="60" y="52" width="180" height="32" rx="16" fill="#ffffff" fill-opacity="0.15" />
  <text x="150" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.9" text-anchor="middle" font-weight="600" letter-spacing="1">WEB FUNDAMENTALS</text>

  <!-- Course number -->
  <text x="60" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.6" font-weight="500" letter-spacing="2">COURSE 01</text>

  <!-- Course title -->
  <text x="60" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#ffffff" font-weight="800" letter-spacing="-1">HTML</text>

  <!-- Subtitle -->
  <text x="60" y="262" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.75" font-weight="400">Structure &amp; Semantics</text>

  <!-- Divider -->
  <line x1="60" y1="295" x2="300" y2="295" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />

  <!-- Stats -->
  <text x="60" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.7">4 Modules  ·  14 Lessons  ·  No Prerequisites</text>

  <!-- HTML5 shield icon (simplified) -->
  <g transform="translate(648, 160)">
    <polygon points="46,0 92,10 80,90 46,110 12,90 0,10" fill="#ffffff" fill-opacity="0.12" />
    <polygon points="46,14 78,22 68,82 46,96 24,82 14,22" fill="#ffffff" fill-opacity="0.08" />
    <text x="46" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#ffffff" fill-opacity="0.5" font-weight="900" text-anchor="middle">5</text>
  </g>
</svg>

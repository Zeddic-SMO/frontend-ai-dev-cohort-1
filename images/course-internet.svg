<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2b4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#1a6b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#041524;stop-opacity:1" />
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="0" y1="320" x2="800" y2="320" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="480" y1="0" x2="480" y2="400" />
    <line x1="640" y1="0" x2="640" y2="400" />
  </g>

  <!-- ── Network topology (right side) ── -->

  <!-- Connection lines between nodes -->
  <!-- Hub (630,200) to node A (520,100) -->
  <line x1="630" y1="200" x2="520" y2="100" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.5" />
  <!-- Hub to node B (740,110) -->
  <line x1="630" y1="200" x2="740" y2="110" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.5" />
  <!-- Hub to node C (760,260) -->
  <line x1="630" y1="200" x2="760" y2="260" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.5" />
  <!-- Hub to node D (680,320) -->
  <line x1="630" y1="200" x2="680" y2="320" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.5" />
  <!-- Hub to node E (510,290) -->
  <line x1="630" y1="200" x2="510" y2="290" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.5" />
  <!-- Cross-connections -->
  <line x1="520" y1="100" x2="740" y2="110" stroke="#48cae4" stroke-opacity="0.12" stroke-width="1" />
  <line x1="740" y1="110" x2="760" y2="260" stroke="#48cae4" stroke-opacity="0.12" stroke-width="1" />
  <line x1="760" y1="260" x2="680" y2="320" stroke="#48cae4" stroke-opacity="0.12" stroke-width="1" />
  <line x1="510" y1="290" x2="680" y2="320" stroke="#48cae4" stroke-opacity="0.12" stroke-width="1" />
  <!-- Extra outer node (786,180) -->
  <line x1="740" y1="110" x2="786" y2="180" stroke="#00b4d8" stroke-opacity="0.15" stroke-width="1" />
  <line x1="760" y1="260" x2="786" y2="180" stroke="#00b4d8" stroke-opacity="0.15" stroke-width="1" />
  <!-- Extra outer node (490,170) -->
  <line x1="520" y1="100" x2="490" y2="170" stroke="#00b4d8" stroke-opacity="0.15" stroke-width="1" />
  <line x1="510" y1="290" x2="490" y2="170" stroke="#00b4d8" stroke-opacity="0.15" stroke-width="1" />
  <line x1="630" y1="200" x2="490" y2="170" stroke="#00b4d8" stroke-opacity="0.2" stroke-width="1" />

  <!-- Glow halos behind hub nodes (blurred) -->
  <circle cx="630" cy="200" r="28" fill="#00d4ff" fill-opacity="0.12" filter="url(#blur)" />
  <circle cx="520" cy="100" r="16" fill="#00d4ff" fill-opacity="0.1" filter="url(#blur)" />
  <circle cx="740" cy="110" r="14" fill="#00d4ff" fill-opacity="0.09" filter="url(#blur)" />

  <!-- Satellite / outer nodes (small) -->
  <circle cx="520" cy="100" r="7" fill="#041e36" stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.8" />
  <circle cx="740" cy="110" r="7" fill="#041e36" stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.7" />
  <circle cx="760" cy="260" r="7" fill="#041e36" stroke="#48cae4" stroke-width="1.5" stroke-opacity="0.6" />
  <circle cx="680" cy="320" r="7" fill="#041e36" stroke="#48cae4" stroke-width="1.5" stroke-opacity="0.6" />
  <circle cx="510" cy="290" r="7" fill="#041e36" stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.7" />
  <circle cx="786" cy="180" r="5" fill="#041e36" stroke="#48cae4" stroke-width="1.2" stroke-opacity="0.5" />
  <circle cx="490" cy="170" r="5" fill="#041e36" stroke="#48cae4" stroke-width="1.2" stroke-opacity="0.5" />

  <!-- Central hub node -->
  <circle cx="630" cy="200" r="18" fill="#041e36" stroke="#00d4ff" stroke-width="2" />
  <circle cx="630" cy="200" r="10" fill="#00b4d8" fill-opacity="0.5" />
  <circle cx="630" cy="200" r="4" fill="#00d4ff" />

  <!-- Animated-look pulse rings -->
  <circle cx="630" cy="200" r="26" fill="none" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="1" />
  <circle cx="630" cy="200" r="36" fill="none" stroke="#00d4ff" stroke-opacity="0.07" stroke-width="1" />

  <!-- Data packet dots on lines -->
  <circle cx="575" cy="150" r="3" fill="#00d4ff" fill-opacity="0.8" />
  <circle cx="695" cy="154" r="3" fill="#00d4ff" fill-opacity="0.6" />
  <circle cx="570" cy="245" r="3" fill="#48cae4" fill-opacity="0.7" />

  <!-- ── Decorative text watermark ── -->
  <text x="420" y="390" font-family="monospace" font-size="88" fill="#ffffff" fill-opacity="0.025" font-weight="bold">HTTP</text>

  <!-- ── Left content area ── -->

  <!-- Track badge -->
  <rect x="60" y="52" width="196" height="32" rx="16" fill="#00b4d8" fill-opacity="0.15" />
  <text x="158" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#00d4ff" fill-opacity="0.9" text-anchor="middle" font-weight="600" letter-spacing="1">WEB FUNDAMENTALS</text>

  <!-- Label above title -->
  <text x="60" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#48cae4" fill-opacity="0.7" font-weight="500" letter-spacing="2">HOW THE</text>

  <!-- Main title -->
  <text x="60" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="74" fill="#ffffff" font-weight="800" letter-spacing="-2">Internet</text>

  <!-- Title line 2 -->
  <text x="62" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#00d4ff" fill-opacity="0.85" font-weight="600" letter-spacing="1">Works</text>

  <!-- Divider -->
  <line x1="60" y1="305" x2="330" y2="305" stroke="url(#glowLine)" stroke-width="1" />

  <!-- Stats -->
  <text x="60" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5">5 Modules  ·  18 Lessons  ·  No Prerequisites</text>

  <!-- DNS / TCP / HTTP pill tags -->
  <rect x="60" y="355" width="46" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
  <text x="83" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00d4ff" fill-opacity="0.8" text-anchor="middle" font-weight="600">DNS</text>

  <rect x="114" y="355" width="52" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
  <text x="140" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00d4ff" fill-opacity="0.8" text-anchor="middle" font-weight="600">TCP/IP</text>

  <rect x="174" y="355" width="52" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
  <text x="200" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00d4ff" fill-opacity="0.8" text-anchor="middle" font-weight="600">HTTP</text>

  <rect x="234" y="355" width="52" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
  <text x="260" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00d4ff" fill-opacity="0.8" text-anchor="middle" font-weight="600">HTTPS</text>
</svg>

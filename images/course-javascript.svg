<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#323330;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a18;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Yellow accent block top-right -->
  <rect x="560" y="0" width="240" height="400" fill="#F7DF1E" fill-opacity="0.06" />

  <!-- Decorative circles -->
  <circle cx="680" cy="-40" r="200" fill="#F7DF1E" fill-opacity="0.04" />
  <circle cx="720" cy="440" r="160" fill="#F7DF1E" fill-opacity="0.04" />

  <!-- Code decorations -->
  <text x="530" y="130" font-family="monospace" font-size="72" fill="#F7DF1E" fill-opacity="0.08" font-weight="bold">() =&gt; {}</text>
  <text x="60" y="345" font-family="monospace" font-size="40" fill="#F7DF1E" fill-opacity="0.08" font-weight="bold">async/await</text>
  <text x="520" y="375" font-family="monospace" font-size="34" fill="#F7DF1E" fill-opacity="0.08" font-weight="bold">.then()</text>

  <!-- Track badge -->
  <rect x="60" y="52" width="180" height="32" rx="16" fill="#F7DF1E" fill-opacity="0.15" />
  <text x="150" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#F7DF1E" fill-opacity="0.9" text-anchor="middle" font-weight="600" letter-spacing="1">WEB FUNDAMENTALS</text>

  <!-- Course number -->
  <text x="60" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.5" font-weight="500" letter-spacing="2">COURSE 03</text>

  <!-- Course title -->
  <text x="60" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#F7DF1E" font-weight="800" letter-spacing="-1">JavaScript</text>

  <!-- Subtitle -->
  <text x="60" y="262" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.65" font-weight="400">Interactivity &amp; Async Programming</text>

  <!-- Divider -->
  <line x1="60" y1="295" x2="380" y2="295" stroke="#F7DF1E" stroke-opacity="0.2" stroke-width="1" />

  <!-- Stats -->
  <text x="60" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.6">4 Modules  ·  14 Lessons  ·  Requires HTML &amp; CSS</text>

  <!-- JS badge -->
  <rect x="648" y="160" width="108" height="108" rx="12" fill="#F7DF1E" fill-opacity="0.15" />
  <text x="702" y="232" font-family="'Segoe UI', Arial, sans-serif" font-size="52" fill="#F7DF1E" fill-opacity="0.55" font-weight="900" text-anchor="middle">JS</text>
</svg>

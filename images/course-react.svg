<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="680" cy="-40" r="200" fill="#61DAFB" fill-opacity="0.04" />
  <circle cx="720" cy="440" r="160" fill="#61DAFB" fill-opacity="0.04" />

  <!-- React atom icon (decorative, top-right) -->
  <g transform="translate(630, 80)" opacity="0.12">
    <!-- Nucleus -->
    <circle cx="92" cy="120" r="12" fill="#61DAFB" />
    <!-- Orbit 1 -->
    <ellipse cx="92" cy="120" rx="88" ry="30" fill="none" stroke="#61DAFB" stroke-width="2.5" />
    <!-- Orbit 2 -->
    <ellipse cx="92" cy="120" rx="88" ry="30" fill="none" stroke="#61DAFB" stroke-width="2.5" transform="rotate(60 92 120)" />
    <!-- Orbit 3 -->
    <ellipse cx="92" cy="120" rx="88" ry="30" fill="none" stroke="#61DAFB" stroke-width="2.5" transform="rotate(120 92 120)" />
  </g>

  <!-- Code decorations -->
  <text x="60" y="345" font-family="monospace" font-size="40" fill="#61DAFB" fill-opacity="0.07" font-weight="bold">&lt;Component /&gt;</text>
  <text x="530" y="375" font-family="monospace" font-size="34" fill="#61DAFB" fill-opacity="0.07" font-weight="bold">useState</text>

  <!-- Track badge -->
  <rect x="60" y="52" width="100" height="32" rx="16" fill="#61DAFB" fill-opacity="0.15" />
  <text x="110" y="73" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#61DAFB" fill-opacity="0.95" text-anchor="middle" font-weight="600" letter-spacing="1">REACT</text>

  <!-- Course number -->
  <text x="60" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.5" font-weight="500" letter-spacing="2">COURSE 05</text>

  <!-- Course title -->
  <text x="60" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#61DAFB" font-weight="800" letter-spacing="-1">React</text>

  <!-- Subtitle -->
  <text x="60" y="262" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.65" font-weight="400">Components, State &amp; Modern SPA Development</text>

  <!-- Divider -->
  <line x1="60" y1="295" x2="420" y2="295" stroke="#61DAFB" stroke-opacity="0.2" stroke-width="1" />

  <!-- Stats -->
  <text x="60" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.6">4 Modules  ·  16 Lessons  ·  Requires Courses 1–4</text>
</svg>

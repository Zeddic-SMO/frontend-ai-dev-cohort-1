  <rect x="60" y="688" width="76" height="22" rx="11" fill="#61DAFB" fill-opacity="0.12" />
  <text x="98" y="704" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#61DAFB" text-anchor="middle" font-weight="700" letter-spacing="1.5">REACT</text>


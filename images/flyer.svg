  <rect x="60" y="402" width="164" height="22" rx="11" fill="#7c3aed" fill-opacity="0.18" />
  <text x="142" y="418" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="700" letter-spacing="1.5">WEB FUNDAMENTALS</text>


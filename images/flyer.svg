  <text x="400" y="278" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="32" fill="#f59e0b" text-anchor="middle" font-weight="800" letter-spacing="2">30 MAY 2026</text>

  <!-- ═══════════════ INTRO BAR ═══════════════ -->
  <rect x="0" y="285" width="800" height="62" fill="#1e1b4b" />
  <text x="400" y="321" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle" font-weight="400">A structured, project-based program — from web fundamentals to AI-powered applications.</text>

  <!-- ═══════════════ CURRICULUM ═══════════════ -->


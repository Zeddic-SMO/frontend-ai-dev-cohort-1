<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1150" viewBox="0 0 800 1150">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0a38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0b1f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.28" />
      <stop offset="100%" style="stop-color:#0d0b1f;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0a38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0c29;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Body background -->
  <rect width="800" height="1150" fill="url(#bodyBg)" />

  <!-- ═══════════════ HERO ═══════════════ -->
  <rect x="0" y="0" width="800" height="285" fill="url(#heroBg)" />
  <rect x="0" y="0" width="800" height="285" fill="url(#heroGlow)" />

  <!-- Decorative circles -->
  <circle cx="720" cy="-30" r="200" fill="#7c3aed" fill-opacity="0.08" />
  <circle cx="70"  cy="310" r="160" fill="#4f46e5" fill-opacity="0.06" />
  <circle cx="760" cy="260" r="80"  fill="#a855f7" fill-opacity="0.05" />

  <!-- Cohort badge -->
  <rect x="300" y="36" width="200" height="30" rx="15" fill="url(#purple)" fill-opacity="0.75" />
  <text x="400" y="57" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="3">COHORT · 01</text>

  <!-- Program title -->
  <text x="400" y="150" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="90" fill="#ffffff" text-anchor="middle" font-weight="900" letter-spacing="-2">FRONTEND</text>
  <text x="400" y="193" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="26" fill="#a78bfa" text-anchor="middle" font-weight="600" letter-spacing="8">DEVELOPMENT PROGRAM</text>

  <!-- Divider -->
  <line x1="290" y1="213" x2="510" y2="213" stroke="#7c3aed" stroke-opacity="0.5" stroke-width="1" />


  <text x="60" y="380" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#7c3aed" font-weight="700" letter-spacing="4">CURRICULUM</text>
  <line x1="60" y1="390" x2="740" y2="390" stroke="#1f2937" stroke-width="1" />


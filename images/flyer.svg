  <text x="84" y="760" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="16" fill="#f1f5f9" font-weight="700">React — Components, State &amp; SPAs</text>
  <text x="730" y="748" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="end">4 modules · 16 lessons</text>

  <!-- ─── Track 3: Frontend AI ─── -->
  <rect x="60" y="788" width="122" height="22" rx="11" fill="#a855f7" fill-opacity="0.18" />
  <text x="121" y="804" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="700" letter-spacing="1.5">FRONTEND AI</text>

  <!-- Course 06: Frontend AI -->
  <rect x="60" y="820" width="680" height="54" rx="8" fill="#ffffff" fill-opacity="0.025" />
  <rect x="60" y="820" width="4"   height="54" rx="2" fill="url(#purple)" />
  <text x="84" y="840" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="1">COURSE 06</text>
  <text x="84" y="860" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="16" fill="#f1f5f9" font-weight="700">Frontend AI Development</text>
  <text x="730" y="848" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="end">4 modules · 14 lessons</text>

  <!-- ═══════════════ MASTER SESSION ═══════════════ -->
  <rect x="60" y="892" width="680" height="96" rx="12" fill="#f59e0b" fill-opacity="0.06" />
  <rect x="60" y="892" width="680" height="96" rx="12" stroke="#f59e0b" stroke-opacity="0.22" stroke-width="1" fill="none" />
  <rect x="60" y="892" width="4"   height="96" rx="2" fill="url(#gold)" />

  <rect x="80" y="904" width="132" height="20" rx="10" fill="#f59e0b" fill-opacity="0.18" />
  <text x="146" y="919" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="700" letter-spacing="1.5">MASTER SESSION</text>

  <text x="80" y="951" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="19" fill="#fef3c7" font-weight="800">Software Development Lifecycle</text>
  <text x="80" y="974" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#b45309" font-weight="400">Planning  ·  Development  ·  Testing  ·  Deployment  ·  Maintenance</text>

  <!-- ═══════════════ FOOTER STATS ═══════════════ -->
  <line x1="0" y1="1018" x2="800" y2="1018" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1" />
  <rect x="0" y="1018" width="800" height="132" fill="url(#footerBg)" />

  <!-- Stat 1 — Courses -->
  <text x="100" y="1074" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="40" fill="#ffffff" text-anchor="middle" font-weight="900">6</text>
  <text x="100" y="1098" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="700" letter-spacing="2">COURSES</text>

  <line x1="200" y1="1040" x2="200" y2="1110" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1" />

  <!-- Stat 2 — Modules -->
  <text x="300" y="1074" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="40" fill="#ffffff" text-anchor="middle" font-weight="900">23</text>
  <text x="300" y="1098" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="700" letter-spacing="2">MODULES</text>

  <line x1="400" y1="1040" x2="400" y2="1110" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1" />

  <!-- Stat 3 — Lessons -->
  <text x="500" y="1074" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="40" fill="#ffffff" text-anchor="middle" font-weight="900">81</text>
  <text x="500" y="1098" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="700" letter-spacing="2">LESSONS</text>

  <line x1="600" y1="1040" x2="600" y2="1110" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1" />

  <!-- Stat 4 — Master Session -->
  <text x="700" y="1074" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="40" fill="#f59e0b" text-anchor="middle" font-weight="900">1</text>
  <text x="700" y="1098" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="700" letter-spacing="1">MASTER SESSION</text>

  <!-- Bottom brand line -->
  <text x="400" y="1138" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="400" letter-spacing="1">COHORT 01  ·  30 MAY 2026  ·  FRONTEND DEVELOPMENT PROGRAM</text>
</svg>

  <rect x="60" y="434" width="680" height="54" rx="8" fill="#ffffff" fill-opacity="0.025" />
  <rect x="60" y="434" width="4"   height="54" rx="2" fill="#E44D26" />
  <text x="84" y="454" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="1">COURSE 01</text>
  <text x="84" y="474" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="16" fill="#f1f5f9" font-weight="700">HTML — Structure &amp; Semantics</text>
  <text x="730" y="462" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="end">4 modules · 14 lessons</text>

  <!-- Course 02: CSS -->
  <rect x="60" y="496" width="680" height="54" rx="8" fill="#ffffff" fill-opacity="0.025" />
  <rect x="60" y="496" width="4"   height="54" rx="2" fill="#264DE4" />
  <text x="84" y="516" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="1">COURSE 02</text>
  <text x="84" y="536" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="16" fill="#f1f5f9" font-weight="700">CSS — Styling &amp; Layout</text>
  <text x="730" y="524" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="end">4 modules · 14 lessons</text>

  <!-- Course 03: JavaScript -->
  <rect x="60" y="558" width="680" height="54" rx="8" fill="#ffffff" fill-opacity="0.025" />
  <rect x="60" y="558" width="4"   height="54" rx="2" fill="#F7DF1E" />
  <text x="84" y="578" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="1">COURSE 03</text>
  <text x="84" y="598" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="16" fill="#f1f5f9" font-weight="700">JavaScript — Interactivity &amp; Async</text>
  <text x="730" y="586" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="end">4 modules · 14 lessons</text>

  <!-- Course 04: Git & GitHub -->
  <rect x="60" y="620" width="680" height="54" rx="8" fill="#ffffff" fill-opacity="0.025" />
  <rect x="60" y="620" width="4"   height="54" rx="2" fill="#F05032" />
  <text x="84" y="640" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="1">COURSE 04</text>
  <text x="84" y="660" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="16" fill="#f1f5f9" font-weight="700">Git &amp; GitHub — Version Control</text>
